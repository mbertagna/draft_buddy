x-app-base: &app-base
  build: .
  working_dir: /app
  volumes:
    - .:/app
  environment:
    PYTHONPATH: /app/src

services:
  webapp:
    <<: *app-base
    ports:
      - "5001:5001"
    command: python scripts/run_webapp.py

  train:
    <<: *app-base
    command: python scripts/train.py

  test:
    <<: *app-base
    command: python -m pytest tests/

  test-cov:
    <<: *app-base
    command: >
      python -m pytest tests/
      --cov=src/draft_buddy
      --cov-branch
      --cov-report=term-missing
      --cov-report=xml:/app/coverage.xml
      --cov-report=html:/app/htmlcov

  data:
    <<: *app-base
    command: python scripts/generate_projections.py --year 2025

  ast:
    <<: *app-base
    command: >
      python -m draft_buddy.arch_viz.cli
      --project-root /app
      --output-dir /app/viz
      --all-default-entries
      --strategy module
