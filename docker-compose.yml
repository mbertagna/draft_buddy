services:
  train:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    command: python scripts/train.py

  webapp:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    command: python scripts/run_webapp.py

  test:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    command: python -m pytest tests/

  test-cov:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    command: >
      python -m pytest tests/
      --cov=src/draft_buddy
      --cov-branch
      --cov-report=term-missing
      --cov-report=xml:/app/coverage.xml
      --cov-report=html:/app/htmlcov

  data:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
    command: python scripts/generate_projections.py --year 2025

  ast:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
    command: >
      python -m draft_buddy.arch_viz.cli
      --project-root /app
      --output-dir /app/viz
      --all-default-entries
      --strategy module